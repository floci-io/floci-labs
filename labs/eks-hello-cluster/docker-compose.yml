# Optional. Skip this if Floci is already running (`floci start`).
#
# EKS is one of the services Floci backs with real Docker: it launches a k3s node via
# the mounted docker.sock, so that mount is required for the cluster to come up.
services:
  floci:
    image: floci/floci:latest
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Uncomment to run the kubectl BONUS (deploy-workload.sh) from inside Floci's network,
